server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA history fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API proxy.
  location /api/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    # Custom-game artwork uploads (covers/screenshots) are multipart; the nginx
    # default body cap is 1 MB, which would 413 them before they reach the API.
    client_max_body_size 512m;
    # Large game downloads must stream, not buffer.
    proxy_buffering off;
    proxy_request_buffering off;
  }

  # WebSocket proxy for live job progress.
  location /ws {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }
}
