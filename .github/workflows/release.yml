name: Release

# Cut a release by pushing a semver tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# This builds multi-arch Docker images for the API and web, publishes them to
# GHCR, and creates a GitHub Release with auto-generated notes.

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write # create the GitHub Release
  packages: write # push images to GHCR

jobs:
  images:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: ./api
            image: gameledger-api
          - context: ./web
            image: gameledger-web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives image tags from the git tag: full version, major.minor, major,
      # and `latest`. Image name is lowercased automatically.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    needs: images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Self-hosted game library & distribution platform — *Jellyfin for games*.

            ### Run it

            ```bash
            curl -O https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/docker-compose.yml
            curl -O https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/.env.example
            cp .env.example .env   # set a strong ADMIN_PASSWORD and your LIBRARY_PATH
            docker compose up -d
            ```

            Prebuilt images for this release:
            - `ghcr.io/${{ github.repository_owner }}/gameledger-api:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/gameledger-web:${{ github.ref_name }}`
